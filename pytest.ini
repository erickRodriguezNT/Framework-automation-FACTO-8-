[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# pytest-bdd: directorio base de features
bdd_features_base_dir = tests/features

# Allure + verbosidad + short traceback
addopts =
    --alluredir=allure-results
    -v
    --tb=short

# Logging en consola
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s - %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# Markers registrados
markers =
    smoke: Pruebas de humo - validación rápida de funcionalidades críticas
    regression: Pruebas de regresión completas
    factura: Flujos de emisión de facturas
    nota_credito: Flujos de nota de crédito
    ppd: Flujos PPD (Pago en Parcialidades o Diferido)
    complemento_pago: Flujos de complemento de pago
    adenda: Flujos de adenda
    dependencias: Pruebas de dependencias entre flujos
    end_to_end: Pruebas de flujo completo extremo a extremo
